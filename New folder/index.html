<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Be My Valentine 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- Music Start Overlay (if autoplay blocked) -->
  <div id="musicOverlay" class="music-overlay">
    <p>Tap anywhere to start 💖</p>
  </div>

  <!-- Dark Overlay -->
  <div class="overlay"></div>

  <!-- Main Content -->
  <div class="container">
    <h1>Do You Love Me? 💘</h1>

    <div class="buttons">
      <button class="yes" onclick="sayYes()">Yes 💖</button>
      <button class="no" onclick="sayNo()">No 😢</button>
    </div>
  </div>

  <!-- Error Popup -->
  <div class="popup" id="popup">
    <h2>❌ ERROR</h2>
    <p>"No" is currently unavailable.<br>Please try YES.</p>
    <button onclick="closePopup()">Okay, YES 💕</button>
  </div>

  <!-- JavaScript -->
  <script>
    const music = document.getElementById("bgMusic");
    const overlay = document.getElementById("musicOverlay");

    // Try autoplay on load
    window.addEventListener("load", () => {
      const playPromise = music.play();

      if (playPromise !== undefined) {
        playPromise
          .then(() => {
            overlay.style.display = "none";
          })
          .catch(() => {
            overlay.style.display = "flex";
          });
      }
    });

    // If autoplay blocked, play on first click
    overlay.addEventListener("click", () => {
      music.play();
      overlay.style.display = "none";
    });

    function sayYes() {
      document.body.innerHTML = `
        <div class="success">
          <h1>She Said YESSS 💖✨</h1>
          <p>Best Day Ever 🥹💘</p>
        </div>
      `;
    }

    function sayNo() {
      document.getElementById("popup").style.display = "block";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
